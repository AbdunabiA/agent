services:
  agent:
    build: .
    container_name: agent
    ports:
      - "8765:8765"
    volumes:
      - ./agent.yaml:/app/agent.yaml:ro
      - ./.env:/app/.env:ro
      - ./soul.md:/app/soul.md
      - ./HEARTBEAT.md:/app/HEARTBEAT.md
      - ./skills:/app/skills
      - agent-data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  agent-data:
    driver: local
