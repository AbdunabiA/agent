name: build_app
description: "End-to-end application development — plan, design, build, test, review, deploy, document"
stages:
  - name: planning
    parallel: true
    agents:
      - team: product
        role: product_manager
      - team: engineering
        role: architect

  - name: database
    agents:
      - team: engineering
        role: database_engineer

  - name: implementation
    parallel: true
    agents:
      - team: engineering
        role: backend_developer
      - team: engineering
        role: frontend_developer

  - name: testing
    parallel: true
    agents:
      - team: quality
        role: qa_engineer
      - team: quality
        role: integration_tester

  - name: review
    feedback_target: false
    parallel: true
    agents:
      - team: engineering
        role: code_reviewer
      - team: quality
        role: security_reviewer
    denied_tools:
      - file_write
      - assign_task
      - request_review
      - ask_team
    feedback:
      fix_stage: fix_issues
      max_retries: 3

  - name: fix_issues
    feedback_target: true
    parallel: true
    agents:
      - team: engineering
        role: backend_developer
      - team: engineering
        role: frontend_developer

  - name: deployment
    agents:
      - team: engineering
        role: devops_engineer

  - name: documentation
    parallel: true
    agents:
      - team: content
        role: technical_writer
      - team: content
        role: api_docs_writer
